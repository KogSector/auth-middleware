apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-middleware-config
  namespace: confuse
data:
  # Service Configuration
  PORT: "3010"
  HOST: "0.0.0.0"
  ENVIRONMENT: "production"
  
  # Auth0 Configuration
  AUTH0_DOMAIN: "confuse.auth0.com"
  AUTH0_AUDIENCE: "https://confuse-api"
  
  # CORS Configuration
  CORS_ORIGINS: "http://localhost:3000,https://confuse.platform.example.com"
  
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  
  # gRPC Configuration
  GRPC_PORT: "50058"
  GRPC_HOST: "0.0.0.0"
  
  # Session Configuration
  SESSION_TIMEOUT: "3600"
  COOKIE_SECURE: "true"
  COOKIE_SAME_SITE: "strict"
  
  # Rate Limiting
  RATE_LIMIT_WINDOW: "900000"
  RATE_LIMIT_MAX: "100"
