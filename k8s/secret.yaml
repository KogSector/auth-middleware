apiVersion: v1
kind: Secret
metadata:
  name: auth-middleware-secrets
  namespace: confuse
type: Opaque
stringData:
  # Auth0 Credentials
  AUTH0_CLIENT_ID: "your_auth0_client_id_here"
  AUTH0_CLIENT_SECRET: "your_auth0_client_secret_here"
  
  # Database Credentials (if different from shared)
  # These can override shared credentials if needed
  # DATABASE_USER: "override_user"
  # DATABASE_PASSWORD: "override_password"
  
  # Service-specific Secrets
  SERVICE_API_KEY: "service_api_key_here"
  
  # Encryption Keys (if different from shared)
  # SERVICE_ENCRYPTION_KEY: "32-byte-service-encryption-key"
