steps:
  # Build the container image using the parent directory as the build context
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/auth-middleware:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/auth-middleware:latest'
      - '-f'
      - 'auth-middleware/Dockerfile'
      - '.'
    id: 'Build-Image'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/auth-middleware', '--all-tags']
    id: 'Push-Image'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'auth-middleware'
      - '--image'
      - 'gcr.io/$PROJECT_ID/auth-middleware:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'NODE_ENV=production'
    id: 'Deploy-Cloud-Run'

images:
  - 'gcr.io/$PROJECT_ID/auth-middleware:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/auth-middleware:latest'

options:
  logging: CLOUD_LOGGING_ONLY
